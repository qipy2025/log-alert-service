# config.yaml - 告警推送服务配置
# 敏感信息（API Key / Secret）通过 .env 文件设置

# 日志源
log_source:
  type: windows_share
  path: "c:\\code\\01 log-alert-servies\\log-alert-service\\log-alert-service\\tests\\fixtures\\logs\\"  # 本地测试路径
  use_direct_path: true  # 直接使用配置的路径，不自动添加日期子目录
  polling_interval: 2
  encoding: utf-8
  max_context_lines: 20
  functional_log_window: 5

# 飞书配置（App ID 和 Secret 从 .env 读取）
feishu:
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  chats:
    - chat_id: oc_e0dadc6e5ab606ff14ceb6f1150ee418
      type: production
      name: "设备日志AI分析预警"

# AI 分析（智谱 BigModel Anthropic 兼容端点，Token 从 .env 读取）
ai_analysis:
  enabled: true
  api_key: "${ANTHROPIC_AUTH_TOKEN}"
  api_base_url: "https://open.bigmodel.cn/api/anthropic"
  model: "GLM-5.2"
  max_tokens: 2048
  temperature: 0.3

# 去重
dedup:
  alarm_window: 300
  max_repeat_count: 99

# 设备轮询配置
device_polling:
  interval: 30  # 设备配置变更检测间隔（秒）

# 每日汇总
daily_report:
  enabled: true
  schedule_time: "22:00"

# 监控设备（通过Web界面或数据库管理，此处留空）
devices: []