# config.example.yaml - 测试环境配置模板
# 复制此文件为 config.yaml 并修改相应配置

# ==================== 基础配置 ====================

# 日志源配置
log_source:
  type: windows_share           # 日志类型: windows_share, local, network
  path: "/path/to/device/logs"  # 设备日志路径 (测试环境路径)
  use_direct_path: false        # 是否直接使用路径 (false会自动添加日期子目录)
  polling_interval: 2           # 文件轮询间隔 (秒)
  encoding: utf-8               # 日志文件编码
  max_context_lines: 20         # 最大上下文行数
  functional_log_window: 5      # 功能日志窗口大小

# ==================== 数据库配置 ====================

# MySQL数据库配置
mysql:
  host: localhost               # 数据库主机
  port: 3306                    # 数据库端口
  user: root                    # 数据库用户
  password: "your_password"    # 数据库密码
  database: device_monitoring   # 数据库名称

# ==================== 设备配置 ====================

# 监控设备列表 (这些是默认设备，实际设备从数据库读取)
devices:
  - name: "测试设备1"
    log_path: "\\path\\to\\device1\\logs\\"
    enabled: false              # 默认禁用，通过Web界面启用

  - name: "测试设备2"
    log_path: "/path/to/device2/logs/"
    enabled: false

# ==================== AI分析配置 ====================

# AI分析配置
ai_analysis:
  enabled: true                 # 是否启用AI分析
  api_key: "${CLAUDE_API_KEY}"  # API密钥 (从环境变量读取)
  api_base_url: "http://model-api.desaysv.com"  # API基础URL
  model: "deepseek-v4-flash-anthropic"           # 模型名称
  max_tokens: 2048             # 最大token数
  temperature: 0.3              # 温度参数

# ==================== 飞书通知配置 ====================

# 飞书通知配置
feishu:
  app_id: "${FEISHU_APP_ID}"      # 飞书应用ID (从环境变量读取)
  app_secret: "${FEISHU_APP_SECRET}"  # 飞书应用密钥 (从环境变量读取)
  chats:
    - chat_id: "your_chat_id_1"   # 飞书群聊ID (测试环境)
      type: test                  # 群聊类型: test, production
      name: "测试告警群"

    - chat_id: "your_chat_id_2"   # 生产环境群聊ID
      type: production
      name: "生产告警群"

# ==================== 告警去重配置 ====================

# 告警去重配置
dedup:
  alarm_window: 300            # 告警去重时间窗口 (秒)
  max_repeat_count: 99         # 最大重复次数

# ==================== 设备轮询配置 ====================

# 设备配置变更轮询
device_polling:
  interval: 30                 # 轮询间隔 (秒)

# ==================== 每日汇总配置 ====================

# 每日汇总报告
daily_report:
  enabled: true                # 是否启用每日汇总
  schedule_time: "22:00"       # 发送时间

# ==================== Web服务配置 ====================

# Web服务配置 (也可通过环境变量设置)
web:
  host: "0.0.0.0"              # 监听地址
  port: 5000                   # 监听端口
  debug: false                 # 调试模式
  cors_enabled: true          # 是否启用CORS

# ==================== 日志配置 ====================

# 日志配置
logging:
  level: INFO                  # 日志级别: DEBUG, INFO, WARNING, ERROR
  file: "service.log"          # 日志文件路径
  max_size: 10485760           # 单个日志文件最大大小 (10MB)
  backup_count: 5             # 保留的日志文件数量
  format: "%(asctime)s [%(levelname)s] %(message)s"  # 日志格式

# ==================== 性能配置 ====================

# 性能优化配置
performance:
  thread_pool_size: 4          # 线程池大小
  max_queue_size: 1000         # 最大队列大小
  batch_insert_size: 100      # 批量插入大小

# ==================== 安全配置 ====================

# 安全配置
security:
  secret_key: "${SECRET_KEY}"  # 会话密钥 (从环境变量读取)
  max_login_attempts: 5        # 最大登录尝试次数
  session_timeout: 3600        # 会话超时时间 (秒)

# ==================== 测试环境特定配置 ====================

# 测试环境特殊配置
test_environment:
  mock_mode: false             # 模拟模式 (不发送真实通知)
  dummy_alarm_generation: false  # 生成模拟告警 (用于测试)
  test_data_retention: 7       # 测试数据保留天数